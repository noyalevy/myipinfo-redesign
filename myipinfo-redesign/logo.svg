<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 165" width="540" height="165">
  <defs>
    <!-- Globe circle clip -->
    <clipPath id="circleClip">
      <circle cx="230" cy="75" r="68"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Globe wireframe -->
  <g opacity="0.22" stroke="#ffffff" stroke-width="1.2" fill="none" clip-path="url(#circleClip)">
    <!-- Horizontal latitude lines -->
    <ellipse cx="230" cy="75" rx="68" ry="22"/>
    <ellipse cx="230" cy="75" rx="68" ry="44"/>
    <ellipse cx="230" cy="75" rx="68" ry="62"/>
    <!-- Vertical longitude lines -->
    <ellipse cx="230" cy="75" rx="22" ry="68"/>
    <ellipse cx="230" cy="75" rx="44" ry="68"/>
    <!-- Outer circle -->
    <circle cx="230" cy="75" r="68"/>
  </g>

  <!-- Globe outer ring -->
  <circle cx="230" cy="75" r="68" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" fill="none"/>

  <!-- Location pin tail -->
  <path d="M230 143 L222 118 Q230 125 238 118 Z" fill="rgba(255,255,255,0.15)"/>

  <!-- MY text -->
  <text x="14" y="100" font-family="'Arial Black', 'Impact', sans-serif" font-size="74" font-weight="900" fill="rgba(255,255,255,0.88)" letter-spacing="-2">MY</text>

  <!-- IP text in cyan -->
  <text x="196" y="103" font-family="'Arial Black', 'Impact', sans-serif" font-size="70" font-weight="900" fill="#22d3ee" letter-spacing="-1" filter="url(#glow)">IP</text>

  <!-- INFO text -->
  <text x="304" y="100" font-family="'Arial Black', 'Impact', sans-serif" font-size="74" font-weight="900" fill="rgba(255,255,255,0.88)" letter-spacing="-2">INFO</text>
</svg>
